<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Games Hub - 3D Racing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --glass: rgba(10, 10, 15, 0.85); }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        
        /* UI Elements */
        #header { position: absolute; top: 0; width: 100%; padding: 15px 30px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 10; }
        .title { font-size: 28px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }
        .economy { font-size: 20px; font-weight: bold; color: #ffd700; }
        
        #menu-ui { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--glass); padding: 40px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); text-align: center; z-index: 20; width: 350px; }
        h2 { color: white; margin-top: 0; font-size: 24px; }
        
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--neon); background: rgba(0, 255, 204, 0.1); color: var(--neon); font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        #hud { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 32px; font-weight: bold; color: white; text-shadow: 2px 2px 4px black; display: none; z-index: 10; }
        #controls-hint { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 18px; color: rgba(255,255,255,0.5); display: none; z-index: 10; }
    </style>
</head>
<body>

<div id="header">
    <div class="title">DK Games Hub</div>
    <div class="economy">Coins: <span id="coin-display">350</span></div>
</div>

<div id="menu-ui">
    <h2>Main Garage</h2>
    <p style="color: #ccc; margin-bottom: 25px;">Ready your car. Dodge obstacles. Survive.</p>
    <button onclick="startGame()">Start 3D Infinite Race</button>
</div>

<div id="hud">Score: <span id="score-display">0</span></div>
<div id="controls-hint">&larr; Use Left and Right Arrow Keys to Switch Lanes &rarr;</div>

<script>
    // --- 1. CORE VARIABLES ---
    let coins = 350;
    let gameState = 'MENU'; // 'MENU' or 'PLAYING'
    let score = 0;
    let gameSpeed = 0.5;
    let currentLane = 1; // Lanes: 0, 1, 2, 3
    const laneXPositions = [-4.5, -1.5, 1.5, 4.5]; // 4 distinct lanes
    let obstacles = [];
    let spawnTimer = 0;

    // UI Elements
    const menuUI = document.getElementById('menu-ui');
    const hud = document.getElementById('hud');
    const controlsHint = document.getElementById('controls-hint');
    const scoreDisplay = document.getElementById('score-display');
    const coinDisplay = document.getElementById('coin-display');

    // --- 2. THREE.JS SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.015); // Gives the illusion of objects appearing from distance

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- 3. GAME OBJECTS ---
    // The Infinite Road (Grid)
    const gridHelper = new THREE.GridHelper(200, 50, 0x00ffcc, 0x222222);
    gridHelper.position.y = -1;
    scene.add(gridHelper);

    // Player Car (Custom Swift placeholder)
    const carGroup = new THREE.Group();
    const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0088ff, roughness: 0.3 });
    const playerCar = new THREE.Mesh(bodyGeo, bodyMat);
    playerCar.castShadow = true;
    playerCar.position.y = -0.5;
    carGroup.add(playerCar);
    scene.add(carGroup);

    // Initial Camera Position for Menu
    camera.position.set(6, 4, 8);
    camera.lookAt(0, 0, 0);

    // --- 4. GAME CONTROLS & LOGIC ---
    document.addEventListener('keydown', (e) => {
        if (gameState !== 'PLAYING') return;
        if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
        if (e.key === 'ArrowRight' && currentLane < 3) currentLane++;
    });

    function startGame() {
        // Reset Variables
        gameState = 'PLAYING';
        score = 0;
        gameSpeed = 0.5;
        currentLane = 1;
        
        // Clear old obstacles
        obstacles.forEach(obs => scene.remove(obs));
        obstacles = [];

        // UI Updates
        menuUI.style.display = 'none';
        hud.style.display = 'block';
        controlsHint.style.display = 'block';

        // Move Camera behind the car for racing view
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, -20);
        
        // Reset Car Position
        carGroup.position.set(laneXPositions[currentLane], 0, 0);
        carGroup.rotation.y = 0;
    }

    function gameOver() {
        gameState = 'MENU';
        
        // Calculate Coin Reward (1 coin per 100 score)
        let reward = Math.floor(score / 100);
        coins += reward;
        coinDisplay.innerText = coins;

        // Reset UI
        menuUI.style.display = 'block';
        hud.style.display = 'none';
        controlsHint.style.display = 'none';
        
        // Move camera back to showcase mode
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 0, 0);

        // Update Menu Text based on performance
        menuUI.innerHTML = `
            <h2>CRASHED!</h2>
            <p style="color: #ff4444; font-size: 20px;">Score: ${Math.floor(score)}</p>
            <p style="color: #ffd700;">Earned: +${reward} Coins</p>
            <button onclick="startGame()">Race Again</button>
        `;
    }

    function spawnObstacle() {
        // Create an obstacle (Competitor Car / Block)
        const obsGeo = new THREE.BoxGeometry(2, 1, 4);
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0044 });
        const obstacle = new THREE.Mesh(obsGeo, obsMat);
        
        // Pick a random lane
        const randomLane = Math.floor(Math.random() * 4);
        obstacle.position.set(laneXPositions[randomLane], -0.5, -100); // Start far away
        obstacle.castShadow = true;
        
        scene.add(obstacle);
        obstacles.push(obstacle);
    }

    // --- 5. MAIN RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        if (gameState === 'MENU') {
            // Showcase Spin
            carGroup.rotation.y += 0.005;
        } 
        else if (gameState === 'PLAYING') {
            // 1. Smoothly switch lanes (Interpolation)
            const targetX = laneXPositions[currentLane];
            carGroup.position.x += (targetX - carGroup.position.x) * 0.15;
            
            // Tilt car slightly when turning
            carGroup.rotation.z = (carGroup.position.x - targetX) * 0.05;

            // 2. Increase Speed & Score
            gameSpeed += 0.0005; // Gets faster every frame
            score += gameSpeed * 2;
            scoreDisplay.innerText = Math.floor(score);

            // 3. Move the Grid (creates illusion of speed)
            gridHelper.position.z = (gridHelper.position.z + gameSpeed) % 10;

            // 4. Handle Obstacles
            spawnTimer -= gameSpeed;
            if (spawnTimer <= 0) {
                spawnObstacle();
                spawnTimer = 40; // Reset timer
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += gameSpeed; // Move towards player

                // Collision Detection (Hitbox check)
                if (Math.abs(carGroup.position.x - obs.position.x) < 1.8 && 
                    Math.abs(carGroup.position.z - obs.position.z) < 3.5) {
                    gameOver();
                }

                // Remove obstacle if it passes the camera
                if (obs.position.z > 15) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }
        }

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>

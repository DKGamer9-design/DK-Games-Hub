<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DK Games Hub - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --glass: rgba(10, 10, 15, 0.85); }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; touch-action: none; transition: background 0.5s; }
        
        /* UI Hub */
        #header { position: absolute; top: 0; width: 100%; padding: 15px 30px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 20; }
        .title { font-size: 28px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }
        .economy { font-size: 20px; font-weight: bold; color: #ffd700; }
        
        #sidebar { position: absolute; left: 20px; top: 80px; width: 300px; background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); z-index: 20; max-height: 80vh; overflow-y: auto; }
        h3 { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--neon); }
        button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); border-color: var(--neon); }
        .play-btn { background: rgba(0, 255, 204, 0.2); border-color: var(--neon); color: var(--neon); font-size: 18px; text-transform: uppercase; padding: 15px; }
        
        #achievements { position: absolute; bottom: 20px; right: 20px; background: var(--glass); padding: 15px; border-radius: 8px; border: 1px solid #ffd700; z-index: 20; backdrop-filter: blur(10px); }
        
        /* In-Game UI */
        #hud { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 32px; font-weight: bold; color: white; text-shadow: 2px 2px 5px black; display: none; z-index: 10; }
        #touch-zones { position: absolute; bottom: 0; width: 100%; height: 100%; display: none; z-index: 5; }
        .touch-half { width: 50%; height: 100%; float: left; }
    </style>
</head>
<body>

<div id="header">
    <div class="title">DK Games Hub</div>
    <div class="economy">Coins: <span id="coin-display">350</span></div>
</div>

<div id="sidebar">
    <h3>2017 Swift Garage</h3>
    <button onclick="buyMod(50, 'Sport Alloys')">Sport Alloys (-50 Coins)</button>
    <button onclick="buyMod(100, 'Ambient Lighting')">Ambient Light (-100 Coins)</button>
    <button onclick="buyMod(75, 'Matte Black')">Matte Black Wrap (-75 Coins)</button>

    <h3 style="margin-top: 20px;">Themes</h3>
    <button onclick="buyTheme(30, 'neon')">Cyberpunk Neon (-30 Coins)</button>
    <button onclick="buyTheme(30, 'daylight')">Clear Daylight (-30 Coins)</button>

    <h3 style="margin-top: 20px;">Select Game</h3>
    <button class="play-btn" onclick="startGame(1)">1. 3D Pro Racing</button>
    <button onclick="alert('Slot Open for Future Games')">2. [Slot Open]</button>
    <button onclick="alert('Slot Open for Future Games')">3. [Slot Open]</button>
    <button onclick="alert('Slot Open for Future Games')">4. [Slot Open]</button>
</div>

<div id="achievements">Rank: <span id="rank-display" style="color: #00ffcc;">Beginner</span></div>

<div id="hud">Score: <span id="score-display">0</span></div>
<div id="touch-zones">
    <div class="touch-half" id="left-zone"></div>
    <div class="touch-half" id="right-zone"></div>
</div>

<script>
    // --- 1. STATE & ECONOMY ---
    let gameState = 'HUB'; 
    let coins = 350; let score = 0; let gameSpeed = 0.6;
    let playerLane = 1; let enemyLane = 2; const lanes = [-4.5, -1.5, 1.5, 4.5];
    let objects = []; let environment = [];

    function updateUI() { document.getElementById('coin-display').innerText = coins; }

    function buyMod(cost, mod) {
        if(coins >= cost) { coins -= cost; updateUI(); applyModification(mod); }
        else alert("Not enough coins!");
    }

    function buyTheme(cost, theme) {
        if(coins >= cost) { coins -= cost; updateUI(); changeTheme(theme); }
        else alert("Not enough coins!");
    }

    // --- 2. ADVANCED 3D ENGINE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.Fog(0x050510, 20, 120);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Dynamic Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(-20, 30, -10); sun.castShadow = true;
    scene.add(sun);

    // Environment
    const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 300), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }));
    road.rotation.x = -Math.PI / 2; road.receiveShadow = true;
    scene.add(road);

    const grass = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x0a1a0a }));
    grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1; grass.receiveShadow = true;
    scene.add(grass);

    // --- 3. GRAPHICALLY ENHANCED CAR BUILDER ---
    let playerMaterial = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.8, roughness: 0.2 });
    
    function createCar(material, isPlayer) {
        const group = new THREE.Group();
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4), material);
        chassis.position.y = 0.5; chassis.castShadow = true; group.add(chassis);
        
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.1}));
        cabin.position.set(0, 1.05, -0.2); cabin.castShadow = true; group.add(cabin);

        // Headlights (PointLights)
        if(isPlayer) {
            const hLight1 = new THREE.PointLight(0xffffff, 1, 20); hLight1.position.set(-0.6, 0.6, 2.5); group.add(hLight1);
            const hLight2 = new THREE.PointLight(0xffffff, 1, 20); hLight2.position.set(0.6, 0.6, 2.5); group.add(hLight2);
        }

        return group;
    }

    const playerCar = createCar(playerMaterial, true); scene.add(playerCar);
    const enemyCar = createCar(new THREE.MeshStandardMaterial({color: 0x0044cc, metalness: 0.8, roughness: 0.2}), false); scene.add(enemyCar);

    // Modifications & Themes
    function applyModification(mod) {
        if(mod === 'Matte Black') { playerMaterial.color.setHex(0x111111); playerMaterial.roughness = 0.9; playerMaterial.metalness = 0.1; }
        if(mod === 'Ambient Lighting') { const neon = new THREE.PointLight(0x00ffcc, 2, 5); neon.position.y = 1; playerCar.add(neon); }
        if(mod === 'Sport Alloys') alert("Alloys Installed! Grip increased.");
    }

    function changeTheme(theme) {
        if(theme === 'daylight') {
            scene.background.setHex(0x87CEEB); scene.fog.color.setHex(0x87CEEB);
            grass.material.color.setHex(0x228B22); sun.intensity = 1.2;
        }
        if(theme === 'neon') {
            scene.background.setHex(0x050015); scene.fog.color.setHex(0x050015);
            grass.material.color.setHex(0x0a001a); sun.intensity = 0.5;
        }
    }

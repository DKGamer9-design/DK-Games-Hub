<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DK Games Hub - Ultimate Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --glass: rgba(10, 10, 15, 0.85); }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; touch-action: none; -webkit-user-select: none; }
        
        /* UI Styling */
        #header { position: absolute; top: 0; width: 100%; padding: 15px 20px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 20; }
        .title { font-size: 24px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }
        .economy { font-size: 18px; font-weight: bold; color: #ffd700; }
        
        #sidebar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 30px rgba(0, 255, 204, 0.1); z-index: 20; text-align: center; }
        h3 { margin-top: 0; color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .play-btn { background: rgba(0, 255, 204, 0.2); border-color: var(--neon); color: var(--neon); font-size: 20px; text-transform: uppercase; margin-top: 20px; }
        
        #stats-bar { display: flex; justify-content: space-between; font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .stat { color: #00ffcc; font-weight: bold; }

        /* In-Game HUD */
        #hud { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); text-align: center; display: none; z-index: 10; }
        #score-display { font-size: 36px; font-weight: bold; color: white; text-shadow: 2px 2px 5px black; }
        #difficulty-display { font-size: 18px; font-weight: bold; color: #00ffcc; text-transform: uppercase; margin-top: -5px; text-shadow: 1px 1px 3px black; }
        
        /* Mobile Controls */
        #mobile-controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .steer-btn { width: 80px; height: 80px; background: rgba(0, 255, 204, 0.2); border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); font-size: 30px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .steer-btn:active { background: var(--neon); color: black; }
    </style>
</head>
<body>

<div id="header">
    <div class="title">DK Games Hub</div>
    <div class="economy">Coins: <span id="coin-display">350</span></div>
</div>

<div id="sidebar">
    <h3>Garage: 2017 Custom Hatchback</h3>
    <div id="stats-bar">
        <div>Top Speed: <span class="stat" id="stat-speed">Level 1</span></div>
        <div>Handling: <span class="stat" id="stat-handling">Level 1</span></div>
    </div>
    <button onclick="buyMod(100, 'ECU')">ECU Remap (+Points) - 100 Coins</button>
    <button onclick="buyMod(120, 'Tires')">Racing Tires (+Dodge) - 120 Coins</button>
    <button onclick="buyMod(80, 'Neon')">Neon Underglow - 80 Coins</button>
    <button class="play-btn" onclick="startGame()">▶ Start Race</button>
</div>

<div id="hud">
    <div id="score-display">0</div>
    <div id="difficulty-display">EASY</div>
</div>

<div id="mobile-controls">
    <div class="steer-btn" id="btn-left">◀</div>
    <div class="steer-btn" id="btn-right">▶</div>
</div>

<script>
    // --- 1. GAME VARIABLES ---
    let gameState = 'HUB'; 
    let coins = 350; let score = 0; 
    let baseSpeed = 0.3; // Starts much slower now
    let scoreMultiplier = 1.0; 
    let handlingSpeed = 0.15; 
    
    let playerLane = 1; let enemyLane = 2; const lanes = [-4.5, -1.5, 1.5, 4.5];
    let objects = []; 

    function updateUI() { document.getElementById('coin-display').innerText = coins; }

    function buyMod(cost, mod) {
        if(coins >= cost) {
            coins -= cost; updateUI();
            if(mod === 'ECU') { scoreMultiplier += 0.5; document.getElementById('stat-speed').innerText = "Level 2"; }
            if(mod === 'Tires') { handlingSpeed = 0.35; document.getElementById('stat-handling').innerText = "Max"; }
            if(mod === 'Neon') { const neon = new THREE.PointLight(0x00ffcc, 3, 8); playerCar.add(neon); }
        } else { alert("Not enough coins!"); }
    }

    // --- 2. 3D GRAPHICS SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050510, 30, 150);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, -10); dirLight.castShadow = true;
    scene.add(dirLight);

    const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 400), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
    road.rotation.x = -Math.PI / 2; road.receiveShadow = true; scene.add(road);

    // --- 3. UPGRADED CAR BUILDER (Spoiler & Tail Lights) ---
    const paintMaterial = new THREE.MeshPhysicalMaterial({ color: 0xcc0000, metalness: 0.8, roughness: 0.1, clearcoat: 1.0 });
    
    function createCar(material, isPlayer) {
        const group = new THREE.Group();
        
        // Main Body
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 4.2), material);
        chassis.position.y = 0.5; chassis.castShadow = true; group.add(chassis);
        
        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.55, 2.2), new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.0}));
        cabin.position.set(0, 1.07, -0.2); cabin.castShadow = true; group.add(cabin);

        if(isPlayer) {
            // Racing Spoiler
            const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.4), material);
            spoilerWing.position.set(0, 1.2, -1.9); spoilerWing.castShadow = true; group.add(spoilerWing);
            const spoilerPillar = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x111111}));
            spoilerPillar.position.set(0, 1.1, -1.9); group.add(spoilerPillar);

            // Red Tail Lights
            const tailLight = new THREE.MeshBasicMaterial({color: 0xff0000});
            const t1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.1), tailLight); t1.position.set(-0.7, 0.6, -2.1); group.add(t1);
            const t2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.1), tailLight); t2.position.set(0.7, 0.6, -2.1); group.add(t2);

            // Bright Headlights
            const hLight1 = new THREE.SpotLight(0xffffff, 2.5, 50, 0.4, 0.5, 1); hLight1.position.set(-0.7, 0.6, 2.1); hLight1.target.position.set(-0.7, 0, 15);
            group.add(hLight1); group.add(hLight1.target);
            const hLight2 = new THREE.SpotLight(0xffffff, 2.5, 50, 0.4, 0.5, 1); hLight2.position.set(0.7, 0.6, 2.1); hLight2.target.position.set(0.7, 0, 15);
            group.add(hLight2); group.add(hLight2.target);
        }
        return group;
    }

    const playerCar = createCar(paintMaterial, true); scene.add(playerCar);
    const enemyCar = createCar(new THREE.MeshPhysicalMaterial({color: 0x0044cc, metalness: 0.8, roughness: 0.1, clearcoat: 1.0}), false); scene.add(enemyCar);

    // --- 4. CONTROLS ---
    function moveLeft() { if(gameState === 'PLAYING' && playerLane > 0) playerLane--; }
    function moveRight() { if(gameState === 'PLAYING' && playerLane < 3) playerLane++; }

    window.addEventListener('keydown', (e) => { if(e.key === 'ArrowLeft') moveLeft(); if(e.key === 'ArrowRight') moveRight(); });
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
    document.getElementById('btn-left').addEventListener('mousedown', moveLeft);
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
    document.getElementById('btn-right').addEventListener('mousedown', moveRight);

    // --- 5. PROGRESSIVE DIFFICULTY LOGIC ---
    function startGame() {
        gameState = 'PLAYING'; score = 0; baseSpeed = 0.3; playerLane = 1; enemyLane = 2;
        objects.forEach(o => scene.remove(o)); objects = [];

        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'flex'; 

        camera.position.set(0, 5, -8); camera.lookAt(0, 1, 10);
        playerCar.position.set(lanes[playerLane], 0, 5);
        enemyCar.position.set(lanes[enemyLane], 0, 15);
    }

    function spawnObstacles(count) {
        let usedLanes = [];
        for(let i=0; i<count; i++) {
            let lane;
            // Ensure obstacles don't spawn in the exact same lane
            do { lane = Math.floor(Math.random() * 4); } while(usedLanes.includes(lane)); 
            usedLanes.push(lane);

            const obs = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 1.8), new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.3 }));
            obs.position.set(lanes[lane], 0.6, 160 + (Math.random() * 10)); // Stagger spawn depth slightly
            obs.castShadow = true; obs.lane = lane;
            scene.add(obs); objects.push(obs);
            
            // Safety measure: never block all 4 lanes
            if(usedLanes.length >= 3) break; 
        }
    }

    let timer = 0;
    function animate() {
        requestAnimationFrame(animate);

        if (gameState === 'HUB') {
            playerCar.position.set(0,0,0); playerCar.rotation.y += 0.005;
            camera.position.set(6, 4, -8); camera.lookAt(0,0,0);
            enemyCar.position.y = -100; 
        } 
        else if (gameState === 'PLAYING') {
            playerCar.rotation.y = 0; enemyCar.position.y = 0;
            
            playerCar.position.x += (lanes[playerLane] - playerCar.position.x) * handlingSpeed;
            playerCar.rotation.z = (playerCar.position.x - lanes[playerLane]) * -0.05;
            
            enemyCar.position.x += (lanes[enemyLane] - enemyCar.position.x) * 0.1;
            
            let danger = objects.find(o => o.lane === enemyLane && o.position.z > enemyCar.position.z && o.position.z < enemyCar.position.z + 50);
            if(danger) { if(enemyLane > 0) enemyLane--; else enemyLane++; }

            // Difficulty Scaling
            baseSpeed += 0.0001; 
            score += (baseSpeed * scoreMultiplier * 5); 
            document.getElementById('score-display').innerText = Math.floor(score);

            let diffText = document.getElementById('difficulty-display');
            let spawnRate = 3.0; // Time between spawns
            let multiSpawnChance = 0;

            if(score < 300) {
                diffText.innerText = "EASY"; diffText.style.color = "#00ffcc";
                spawnRate = 3.0; 
            } else if(score < 1000) {
                diffText.innerText = "MEDIUM"; diffText.style.color = "#ffd700";
                spawnRate = 2.0; 
                multiSpawnChance = 0.3; // 30% chance to spawn 2 obstacles
            } else {
                diffText.innerText = "HARD"; diffText.style.color = "#ff3300";
                spawnRate = 1.2; 
                multiSpawnChance = 0.6; // 60% chance to spawn multiple (up to 3)
            }

            timer += baseSpeed; 
            if(timer > spawnRate) { 
                let count = 1;
                if(Math.random() < multiSpawnChance) {
                    count = (score > 1000 && Math.random() < 0.4) ? 3 : 2; 
                }
                spawnObstacles(count); 
                timer = 0; 
            }

            objects.forEach((obj, index) => {
                obj.position.z -= baseSpeed * 2.5; 
                if(obj.position.z < -10) { scene.remove(obj); objects.splice(index, 1); }
                if(Math.abs(playerCar.position.x - obj.position.x) < 1.6 && Math.abs(playerCar.position.z - obj.position.z) < 2.5) gameOver();
            });
        }
        renderer.render(scene, camera);
    }

    function gameOver() {
        gameState = 'HUB'; 
        let reward = Math.floor(score / 50); coins += reward; updateUI();
        
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none'; 
        
        document.getElementById('sidebar').innerHTML = `
            <h2 style="color:#ff3300; margin-top:0;">CRASHED!</h2>
            <p>Score: ${Math.floor(score)}</p>
            <p style="color:#ffd700;">Earned: +${reward} Coins</p>
            <button class="play-btn" onclick="location.reload()">Back to Garage</button>
        `;
    }

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    animate();
</script>
</body>
</html>
